<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - EventNow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card shadow border-0 p-4" style="width: 100%; max-width: 400px;">
            <h3 class="text-center mb-4">Join EventNow!</h3>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="email@example.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select name="role" class="form-select" required>
                        <option value="attendee">Attendee</option>
                        <option value="organiser">Organiser</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">Sign in</button>
                
                <div class="text-center">
                    <small>Already registered? <a href="{% url 'login' %}" class="text-decoration-none">Sign in </a></small>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
