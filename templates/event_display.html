{% extends 'base.html' %}
{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col-md-8"><h3>Explore Events</h3></div>
    <div class="col-md-4">
        <form method="get" class="d-flex">
            <input type="date" name="date" class="form-control me-2" value="{{ selected_date }}">
            <button type="submit" class="btn btn-secondary">Filter</button>
        </form>
    </div>
</div>

<div class="row">
    {% for event in page_obj %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 border-0 shadow-sm">
            {% if event.image_url %}
                <img src="{{ event.image_url }}" class="card-img-top" alt="{{ event.image_alt_text }}">
            {% endif %}
            <div class="card-body">
                <h5 class="card-title">{{ event.title }}</h5>
                <p class="text-muted small">{{ event.location }} | {{ event.date }}</p>
                <a href="{% url 'event_detail' event.id %}" class="btn btn-primary w-100">View Details</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% include 'partial_pagination.html' %}
{% endblock %}
