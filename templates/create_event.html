{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm border-0 col-md-8 mx-auto">
    <div class="card-header bg-white py-3"><h5>Step 1: Create New Event</h5></div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100">Next: Add Sessions</button>
        </form>
    </div>
</div>
{% endblock %}
