{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm border-0 col-md-8 mx-auto">
    <div class="card-header bg-white py-3">
        <h5>Step 2: Add Sessions for "{{ event.title }}"</h5>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
                <div class="alert alert-info py-2">
                <i class="bi bi-info-circle me-2"></i>
                 Sessions will be created for: <strong>{{ event.date }}</strong>
                </div>
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                </div>

            {% endfor %}
            <div class="d-grid gap-2">
                <button type="submit" name="another" class="btn btn-outline-secondary">Save and Add Another Session</button>
                <button type="submit" class="btn btn-success">Finish and View List</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
